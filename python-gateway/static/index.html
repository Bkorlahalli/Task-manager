<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
            <p class="subtitle">Microservices Demo — Python Gateway → Java Backend → PostgreSQL & Redis</p>
        </header>

        <section class="form-section">
            <h2 id="form-title">Add Task</h2>
            <form id="task-form">
                <input type="hidden" id="task-id" value="">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" required placeholder="Task title">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="Task description"></textarea>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="TODO">TODO</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="DONE">Done</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submit-btn">Add Task</button>
                    <button type="button" id="cancel-btn" class="secondary" style="display:none">Cancel</button>
                </div>
            </form>
        </section>

        <section class="tasks-section">
            <div class="section-header">
                <h2>Tasks</h2>
                <button id="refresh-btn" class="icon-btn" title="Refresh">↻</button>
            </div>
            <div id="loading" class="loading">Loading...</div>
            <div id="error" class="error" style="display:none"></div>
            <ul id="task-list"></ul>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
